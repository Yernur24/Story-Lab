kind = "web"
previewPath = "/"
title = "Ertegi Lab"
version = "1.0.0"
id = "artifacts/ertegi-lab-new"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24369
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ertegi-lab-new run dev"

[services.env]
PORT = "24369"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ertegi-lab-new", "run", "build"]
publicDir = "artifacts/ertegi-lab-new/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
